<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>황산구리 리간드 교환 반응 가상 실험실</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <!-- Lucide Icons CDN -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
      /* --- index.css 스타일 병합 --- */
      @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@300;400;500;600;700;800&display=swap');

      :root {
        font-family: 'Inter', system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;
        line-height: 1.5;
        font-weight: 400;

        color-scheme: dark;
        color: #e2e8f0;
        background-color: #0b0f19;

        font-synthesis: none;
        text-rendering: optimizeLegibility;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;

        /* --- App.css의 CSS 변수 정의 --- */
        --bg-primary: #0b0f19;
        --bg-secondary: rgba(17, 24, 39, 0.7);
        --glass-bg: rgba(30, 41, 59, 0.45);
        --glass-border: rgba(255, 255, 255, 0.08);
        --glass-highlight: rgba(255, 255, 255, 0.04);
        
        --accent-blue: #38bdf8;
        --accent-purple: #c084fc;
        --accent-green: #34d399;
        --accent-rose: #fb7185;
        
        /* Chemical Solution Colors */
        --color-cuso4: rgba(56, 189, 248, 0.65); /* 하늘색 */
        --color-nacl-reaction: rgba(163, 230, 53, 0.7); /* 황록색 */
        --color-nh3-ppt: rgba(147, 197, 253, 0.9); /* 연푸른색 앙금 */
        --color-nh3-deep: rgba(29, 78, 216, 0.85); /* 짙은 청람색 */
        --color-glycine: rgba(139, 92, 246, 0.7); /* 보라색 */
        --color-water: rgba(241, 245, 249, 0.2); /* 증류수 */
      }

      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        margin: 0;
        display: flex;
        min-height: 100vh;
        background: radial-gradient(circle at 50% 50%, #111827 0%, #0b0f19 100%);
        overflow-x: hidden;
      }

      #root {
        width: 100%;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
      }

      /* Custom scrollbars */
      ::-webkit-scrollbar {
        width: 8px;
        height: 8px;
      }

      ::-webkit-scrollbar-track {
        background: rgba(15, 23, 42, 0.3);
      }

      ::-webkit-scrollbar-thumb {
        background: rgba(148, 163, 184, 0.3);
        border-radius: 4px;
      }

      ::-webkit-scrollbar-thumb:hover {
        background: rgba(148, 163, 184, 0.5);
      }

      /* --- App.css 스타일 병합 --- */
      @keyframes pulseGlow {
        0%, 100% { box-shadow: 0 0 15px rgba(56, 189, 248, 0.2); }
        50% { box-shadow: 0 0 25px rgba(56, 189, 248, 0.45); }
      }

      @keyframes dropFlow {
        0% { transform: translateY(-20px) scale(0.8); opacity: 0; }
        30% { opacity: 1; }
        100% { transform: translateY(80px) scale(0.5); opacity: 0; }
      }

      @keyframes scanLine {
        0% { left: 0%; }
        100% { left: 100%; }
      }

      @keyframes shimmer {
        0% { background-position: -200% 0; }
        100% { background-position: 200% 0; }
      }

      /* Base App Layout */
      .app-container {
        display: flex;
        flex-direction: column;
        min-height: 100vh;
        width: 100%;
        color: #f1f5f9;
      }

      /* Header Component */
      .app-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 1.5rem 2rem;
        background: rgba(11, 15, 25, 0.8);
        backdrop-filter: blur(12px);
        border-bottom: 1px solid var(--glass-border);
        position: sticky;
        top: 0;
        z-index: 50;
      }

      .logo-section {
        display: flex;
        align-items: center;
        gap: 0.75rem;
      }

      .logo-icon {
        color: var(--accent-blue);
        filter: drop-shadow(0 0 8px rgba(56, 189, 248, 0.5));
        display: flex;
        align-items: center;
      }

      .logo-text h1 {
        font-family: 'Outfit', sans-serif;
        font-size: 1.4rem;
        font-weight: 800;
        letter-spacing: -0.5px;
        color: #fff;
        margin: 0;
        background: linear-gradient(135deg, #fff 30%, #94a3b8 100%);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
      }

      .logo-text p {
        font-size: 0.75rem;
        color: #64748b;
        font-weight: 500;
      }

      /* Navigation & Status bar */
      .nav-steps {
        display: flex;
        gap: 0.5rem;
      }

      .step-btn {
        display: flex;
        align-items: center;
        gap: 0.5rem;
        padding: 0.6rem 1.2rem;
        border-radius: 9999px;
        border: 1px solid var(--glass-border);
        background: var(--glass-bg);
        color: #94a3b8;
        font-size: 0.85rem;
        font-weight: 500;
        cursor: pointer;
        transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      }

      .step-btn.active {
        background: linear-gradient(135deg, rgba(56, 189, 248, 0.15) 0%, rgba(192, 132, 252, 0.15) 100%);
        border-color: rgba(56, 189, 248, 0.4);
        color: #fff;
        box-shadow: 0 0 15px rgba(56, 189, 248, 0.1);
      }

      .step-btn.completed {
        border-color: rgba(52, 211, 153, 0.3);
        color: var(--accent-green);
      }

      .step-btn:hover:not(:disabled) {
        background: rgba(255, 255, 255, 0.05);
        transform: translateY(-1px);
      }

      .step-btn:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }

      /* Main Workspace */
      .app-content {
        flex: 1;
        padding: 2rem;
        max-width: 1400px;
        margin: 0 auto;
        width: 100%;
      }

      /* Cards & Glassmorphism */
      .glass-card {
        background: var(--glass-bg);
        backdrop-filter: blur(20px);
        border: 1px solid var(--glass-border);
        border-radius: 16px;
        padding: 2rem;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.25);
        margin-bottom: 2rem;
      }

      .card-title {
        font-family: 'Outfit', sans-serif;
        font-size: 1.5rem;
        font-weight: 700;
        color: #fff;
        margin-bottom: 0.5rem;
      }

      .card-subtitle {
        font-size: 0.9rem;
        color: #94a3b8;
        margin-bottom: 1.5rem;
      }

      /* PHASE 0: SAFETY PAGE */
      .safety-layout {
        display: flex;
        flex-direction: column;
        align-items: center;
        max-width: 800px;
        margin: 2rem auto;
      }

      .safety-grid {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 2rem;
        margin: 2.5rem 0;
        width: 100%;
      }

      .safety-item {
        display: flex;
        flex-direction: column;
        align-items: center;
        padding: 2rem;
        border-radius: 12px;
        background: rgba(255, 255, 255, 0.02);
        border: 1px solid var(--glass-border);
        cursor: pointer;
        transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      }

      .safety-item:hover {
        transform: translateY(-5px);
        background: rgba(255, 255, 255, 0.05);
      }

      .safety-item.equipped {
        border-color: var(--accent-green);
        background: rgba(52, 211, 153, 0.05);
        box-shadow: 0 0 20px rgba(52, 211, 153, 0.1);
      }

      .safety-icon-wrapper {
        font-size: 3rem;
        margin-bottom: 1rem;
        transition: transform 0.3s ease;
      }

      .safety-item.equipped .safety-icon-wrapper {
        transform: scale(1.1);
      }

      .safety-item h3 {
        font-size: 1.1rem;
        font-weight: 600;
        color: #fff;
        margin-bottom: 0.5rem;
      }

      .safety-item p {
        font-size: 0.8rem;
        color: #64748b;
        text-align: center;
      }

      .action-btn {
        background: linear-gradient(135deg, var(--accent-blue) 0%, #0284c7 100%);
        color: #fff;
        border: none;
        padding: 0.8rem 2rem;
        border-radius: 8px;
        font-weight: 600;
        cursor: pointer;
        display: flex;
        align-items: center;
        gap: 0.5rem;
        transition: all 0.2s ease;
        box-shadow: 0 4px 12px rgba(56, 189, 248, 0.3);
      }

      .action-btn:hover:not(:disabled) {
        transform: translateY(-2px);
        box-shadow: 0 6px 16px rgba(56, 189, 248, 0.45);
      }

      .action-btn:disabled {
        background: rgba(148, 163, 184, 0.1);
        color: #64748b;
        cursor: not-allowed;
        box-shadow: none;
      }

      /* PHASE 1 & 2: LAB BENCH LAYOUT */
      .lab-layout {
        display: grid;
        grid-template-columns: 320px 1fr;
        gap: 2rem;
      }

      .guide-panel {
        display: flex;
        flex-direction: column;
        gap: 1.5rem;
      }

      .instruction-box {
        background: rgba(15, 23, 42, 0.5);
        border: 1px solid var(--glass-border);
        border-radius: 12px;
        padding: 1.25rem;
      }

      .instruction-step {
        display: flex;
        gap: 0.75rem;
        margin-bottom: 1rem;
        transition: opacity 0.3s ease;
      }

      .step-num {
        background: var(--accent-blue);
        color: #000;
        width: 24px;
        height: 24px;
        border-radius: 9999px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-weight: 700;
        font-size: 0.85rem;
        flex-shrink: 0;
      }

      .step-desc {
        font-size: 0.9rem;
        color: #cbd5e1;
      }

      .opacity-40 {
        opacity: 0.4;
      }

      .bench-panel {
        display: flex;
        flex-direction: column;
        background: linear-gradient(180deg, rgba(30, 41, 59, 0.2) 0%, rgba(15, 23, 42, 0.4) 100%);
        border: 1px solid var(--glass-border);
        border-radius: 16px;
        min-height: 500px;
        position: relative;
        overflow: hidden;
        justify-content: space-between;
      }

      .bench-display {
        flex: 1;
        display: flex;
        justify-content: center;
        align-items: flex-end;
        padding-bottom: 4rem;
        position: relative;
        gap: 3rem;
      }

      /* CHEMICAL APPARATUSES */
      .beaker-container {
        display: flex;
        flex-direction: column;
        align-items: center;
        position: relative;
      }

      .beaker {
        width: 120px;
        height: 140px;
        border: 3px solid rgba(255, 255, 255, 0.55);
        border-top: none;
        border-radius: 0 0 16px 16px;
        position: relative;
        overflow: hidden;
        box-shadow: 0 8px 16px rgba(0, 0, 0, 0.15);
        background: rgba(255, 255, 255, 0.02);
      }

      /* Beaker Pour Spout shape */
      .beaker::before {
        content: '';
        position: absolute;
        top: 0;
        left: -4px;
        right: -4px;
        height: 4px;
        background: rgba(255, 255, 255, 0.6);
        border-radius: 4px 4px 0 0;
      }

      .liquid {
        position: absolute;
        bottom: 0;
        left: 0;
        right: 0;
        background: var(--color-water);
        transition: all 0.8s ease-in-out;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .stirring-rod {
        position: absolute;
        width: 6px;
        height: 160px;
        background: rgba(255, 255, 255, 0.6);
        border-radius: 4px;
        top: -40px;
        left: 55px;
        z-index: 20;
        box-shadow: 0 0 8px rgba(255,255,255,0.2);
        transition: all 0.3s ease;
      }

      .stirring-rod.stirring {
        animation: stirAnim 0.8s infinite linear;
      }

      @keyframes stirAnim {
        0% { transform: rotate(0deg) translate(0, 0); }
        25% { transform: rotate(3deg) translate(-10px, 5px); }
        50% { transform: rotate(0deg) translate(0, 8px); }
        75% { transform: rotate(-3deg) translate(10px, 5px); }
        100% { transform: rotate(0deg) translate(0, 0); }
      }

      /* Precipitate Animation */
      .precipitate {
        position: absolute;
        bottom: 0;
        left: 0;
        right: 0;
        height: 25px;
        background: var(--color-nh3-ppt);
        filter: blur(2px);
        opacity: 0.8;
        border-radius: 0 0 12px 12px;
        transition: all 0.6s ease;
      }

      /* Scale (전자저울) */
      .scale-container {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 0.5rem;
      }

      .lab-scale {
        width: 160px;
        height: 70px;
        background: #334155;
        border-radius: 8px;
        border: 1px solid var(--glass-border);
        box-shadow: 0 8px 20px rgba(0,0,0,0.3);
        display: flex;
        flex-direction: column;
        justify-content: space-between;
        padding: 0.5rem;
        position: relative;
      }

      .scale-plate {
        width: 140px;
        height: 8px;
        background: #94a3b8;
        border-radius: 4px;
        margin: 0 auto;
        box-shadow: inset 0 1px 3px rgba(255,255,255,0.2);
      }

      .scale-display {
        background: #000;
        border: 1px solid #1e293b;
        border-radius: 4px;
        height: 32px;
        display: flex;
        align-items: center;
        justify-content: flex-end;
        padding: 0 0.5rem;
        font-family: monospace;
        font-size: 1.1rem;
        color: #22c55e;
        text-shadow: 0 0 8px rgba(34, 197, 94, 0.6);
      }

      /* Dropper Tool */
      .dropper-wrapper {
        position: absolute;
        z-index: 30;
        transition: all 0.5s cubic-bezier(0.25, 0.8, 0.25, 1);
        display: flex;
        flex-direction: column;
        align-items: center;
      }

      .dropper-bulb {
        width: 24px;
        height: 30px;
        background: #ef4444;
        border-radius: 12px 12px 0 0;
        cursor: pointer;
      }

      .dropper-tube {
        width: 8px;
        height: 80px;
        background: rgba(255, 255, 255, 0.4);
        border-left: 1px solid rgba(255, 255, 255, 0.5);
        border-right: 1px solid rgba(255, 255, 255, 0.5);
        position: relative;
      }

      .dropper-liquid {
        position: absolute;
        bottom: 0;
        left: 0;
        right: 0;
        background: var(--accent-blue);
        transition: height 0.3s ease;
      }

      .dropper-tip {
        width: 4px;
        border-left: 2px solid transparent;
        border-right: 2px solid transparent;
        border-top: 15px solid rgba(255, 255, 255, 0.4);
      }

      .chemical-drop {
        width: 6px;
        height: 10px;
        background: var(--accent-blue);
        border-radius: 50%;
        position: absolute;
        top: 130px;
        animation: dropFlow 0.6s linear forwards;
      }

      /* Flask Component */
      .flask-container {
        display: flex;
        flex-direction: column;
        align-items: center;
        position: relative;
      }

      .volumetric-flask {
        width: 110px;
        height: 160px;
        position: relative;
      }

      .flask-neck {
        width: 20px;
        height: 80px;
        border-left: 2px solid rgba(255,255,255,0.6);
        border-right: 2px solid rgba(255,255,255,0.6);
        margin: 0 auto;
        position: relative;
        background: rgba(255, 255, 255, 0.02);
      }

      .flask-neck-line {
        position: absolute;
        bottom: 30px;
        left: 0;
        right: 0;
        height: 1.5px;
        background: #ef4444;
      }

      .flask-body {
        width: 110px;
        height: 90px;
        border: 2px solid rgba(255,255,255,0.6);
        border-top: none;
        border-radius: 50% 50% 12px 12px;
        margin-top: -12px;
        position: relative;
        overflow: hidden;
        background: rgba(255, 255, 255, 0.02);
      }

      .flask-liquid {
        position: absolute;
        bottom: 0;
        left: 0;
        right: 0;
        background: var(--color-cuso4);
        transition: height 0.8s ease;
      }

      /* Control buttons below bench */
      .control-btn {
        background: var(--glass-bg);
        border: 1px solid var(--glass-border);
        color: #f1f5f9;
        padding: 0.5rem 1rem;
        border-radius: 6px;
        font-size: 0.85rem;
        cursor: pointer;
        transition: all 0.2s ease;
        display: flex;
        align-items: center;
        gap: 0.4rem;
      }

      .control-btn:hover:not(:disabled) {
        background: rgba(255, 255, 255, 0.1);
        border-color: rgba(255, 255, 255, 0.2);
      }

      .control-btn:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }

      .control-btn.primary {
        background: var(--accent-blue);
        color: #0b0f19;
        font-weight: 600;
        border: none;
      }

      .control-btn.primary:hover:not(:disabled) {
        box-shadow: 0 0 12px rgba(56, 189, 248, 0.35);
        background: #7dd3fc;
      }

      /* pH Indicator */
      .ph-indicator-strip {
        width: 20px;
        height: 60px;
        border-radius: 3px;
        transition: all 0.3s ease;
        border: 1px solid rgba(255,255,255,0.2);
        background: #fde047; /* pH 4 - Yellowish */
      }

      /* PHASE 2: SPECTROSCOPY PAGE */
      .spectroscopy-layout {
        display: grid;
        grid-template-columns: 350px 1fr;
        gap: 2rem;
      }

      .device-panel {
        display: flex;
        flex-direction: column;
        gap: 1.5rem;
      }

      .cuvette-rack {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 0.75rem;
        padding: 1.25rem;
        background: rgba(15, 23, 42, 0.5);
        border-radius: 12px;
        border: 1px solid var(--glass-border);
      }

      .cuvette-slot {
        aspect-ratio: 1/2.2;
        border: 1.5px dashed rgba(255, 255, 255, 0.2);
        border-radius: 6px;
        display: flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        transition: all 0.2s ease;
        position: relative;
      }

      .cuvette-slot:hover {
        background: rgba(255, 255, 255, 0.03);
      }

      .cuvette {
        width: 45px;
        height: 100px;
        border: 2px solid rgba(255, 255, 255, 0.6);
        border-radius: 3px;
        position: relative;
        overflow: hidden;
        background: rgba(255,255,255,0.05);
        box-shadow: 0 4px 8px rgba(0,0,0,0.2);
      }

      .cuvette-liquid {
        position: absolute;
        bottom: 0;
        left: 0;
        right: 0;
        height: 75%;
      }

      .cuvette-label {
        position: absolute;
        top: 4px;
        left: 4px;
        background: rgba(0,0,0,0.6);
        color: #fff;
        font-size: 0.65rem;
        padding: 1px 4px;
        border-radius: 2px;
        font-weight: bold;
      }

      .spectroscopy-device {
        background: #1e293b;
        border: 2px solid #334155;
        border-radius: 16px;
        padding: 1.5rem;
        display: flex;
        flex-direction: column;
        gap: 1rem;
        box-shadow: 0 10px 25px rgba(0,0,0,0.4);
      }

      .device-screen {
        background: #020617;
        border: 1px solid #1e293b;
        border-radius: 8px;
        height: 150px;
        padding: 1rem;
        display: flex;
        flex-direction: column;
        justify-content: space-between;
        font-family: 'Courier New', Courier, monospace;
      }

      .screen-row {
        display: flex;
        justify-content: space-between;
        font-size: 0.85rem;
      }

      .screen-status {
        color: #22c55e;
        text-shadow: 0 0 5px rgba(34, 197, 94, 0.4);
      }

      .screen-value {
        color: var(--accent-blue);
        font-weight: bold;
      }

      .device-buttons {
        display: grid;
        grid-template-columns: repeat(2, 1fr);
        gap: 0.75rem;
      }

      .device-btn {
        background: #334155;
        border: 1px solid #475569;
        color: #fff;
        padding: 0.6rem;
        border-radius: 6px;
        font-size: 0.8rem;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.2s ease;
      }

      .device-btn:hover:not(:disabled) {
        background: #475569;
      }

      .device-btn:disabled {
        opacity: 0.4;
        cursor: not-allowed;
      }

      .device-btn.active {
        background: var(--accent-blue);
        color: #0b0f19;
        border-color: var(--accent-blue);
        box-shadow: 0 0 10px rgba(56, 189, 248, 0.3);
      }

      /* UV Slot Inside Device */
      .device-slot {
        height: 120px;
        border: 2px solid #475569;
        background: #0f172a;
        border-radius: 8px;
        display: flex;
        align-items: center;
        justify-content: center;
        position: relative;
        overflow: hidden;
      }

      .uv-beam {
        position: absolute;
        left: 0;
        right: 0;
        height: 12px;
        background: linear-gradient(90deg, transparent, rgba(168, 85, 247, 0.5), transparent);
        animation: scanBeam 1.5s infinite ease-in-out;
        pointer-events: none;
      }

      @keyframes scanBeam {
        0%, 100% { transform: translateY(-30px); opacity: 0.2; }
        50% { transform: translateY(30px); opacity: 0.8; }
      }

      /* CHART DISPLAY */
      .chart-container {
        display: flex;
        flex-direction: column;
        background: #070a13;
        border: 1px solid var(--glass-border);
        border-radius: 16px;
        padding: 1.5rem;
        min-height: 480px;
        position: relative;
      }

      .chart-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 1.5rem;
      }

      .chart-legend {
        display: flex;
        gap: 1rem;
      }

      .legend-item {
        display: flex;
        align-items: center;
        gap: 0.4rem;
        font-size: 0.8rem;
        color: #94a3b8;
      }

      .legend-color {
        width: 12px;
        height: 12px;
        border-radius: 3px;
      }

      .svg-chart-wrapper {
        position: relative;
        flex: 1;
        width: 100%;
      }

      .chart-grid-line {
        stroke: rgba(148, 163, 184, 0.08);
        stroke-dasharray: 4 4;
      }

      .chart-axis {
        stroke: rgba(148, 163, 184, 0.3);
        stroke-width: 1;
      }

      .chart-text {
        fill: #64748b;
        font-size: 11px;
      }

      .chart-line {
        fill: none;
        stroke-width: 3.5;
        stroke-linecap: round;
      }

      /* PHASE 3: REPORT & INTERACTIVE QUIZ */
      .report-grid {
        display: grid;
        grid-template-columns: 2fr 1fr;
        gap: 2rem;
      }

      .report-form {
        display: flex;
        flex-direction: column;
        gap: 2rem;
      }

      .report-section {
        border-bottom: 1px solid rgba(255, 255, 255, 0.06);
        padding-bottom: 2rem;
      }

      .report-section:last-child {
        border-bottom: none;
      }

      .section-num-title {
        display: flex;
        align-items: center;
        gap: 0.75rem;
        font-family: 'Outfit', sans-serif;
        font-size: 1.25rem;
        font-weight: 700;
        color: #fff;
        margin-bottom: 1rem;
      }

      .section-num {
        background: var(--accent-purple);
        color: #0b0f19;
        width: 28px;
        height: 28px;
        border-radius: 8px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-weight: 800;
        font-size: 0.9rem;
      }

      .student-info {
        display: grid;
        grid-template-columns: repeat(2, 1fr);
        gap: 1.5rem;
      }

      .input-group {
        display: flex;
        flex-direction: column;
        gap: 0.5rem;
      }

      .input-label {
        font-size: 0.85rem;
        font-weight: 600;
        color: #94a3b8;
      }

      .text-input {
        background: rgba(15, 23, 42, 0.6);
        border: 1px solid var(--glass-border);
        border-radius: 8px;
        padding: 0.75rem;
        color: #fff;
        font-size: 0.9rem;
        transition: all 0.2s ease;
      }

      .text-input:focus {
        outline: none;
        border-color: var(--accent-purple);
        box-shadow: 0 0 10px rgba(192, 132, 252, 0.15);
      }

      .table-wrapper {
        overflow-x: auto;
        margin: 1rem 0;
      }

      .report-table {
        width: 100%;
        border-collapse: collapse;
      }

      .report-table th, .report-table td {
        border: 1px solid var(--glass-border);
        padding: 0.75rem 1rem;
        text-align: center;
        font-size: 0.9rem;
      }

      .report-table th {
        background: rgba(15, 23, 42, 0.8);
        font-weight: 600;
        color: #cbd5e1;
      }

      .report-table td {
        background: rgba(15, 23, 42, 0.3);
      }

      .table-input {
        width: 100%;
        background: transparent;
        border: none;
        color: #fff;
        text-align: center;
        font-size: 0.9rem;
        outline: none;
        font-weight: 600;
      }

      .question-card {
        background: rgba(255,255,255,0.01);
        border: 1px solid var(--glass-border);
        border-radius: 10px;
        padding: 1.25rem;
        margin-bottom: 1.25rem;
      }

      .question-text {
        font-size: 0.95rem;
        color: #cbd5e1;
        font-weight: 500;
        margin-bottom: 0.75rem;
        line-height: 1.6;
      }

      .textarea-input {
        width: 100%;
        min-height: 100px;
        background: rgba(15, 23, 42, 0.6);
        border: 1px solid var(--glass-border);
        border-radius: 8px;
        padding: 0.75rem;
        color: #fff;
        font-size: 0.9rem;
        resize: vertical;
        line-height: 1.5;
        transition: all 0.2s ease;
      }

      .textarea-input:focus {
        outline: none;
        border-color: var(--accent-purple);
      }

      /* AI Feedback Side Card */
      .feedback-sidebar {
        display: flex;
        flex-direction: column;
        gap: 1.5rem;
        position: sticky;
        top: 100px;
        height: fit-content;
      }

      .feedback-status {
        padding: 1.5rem;
        background: rgba(192, 132, 252, 0.05);
        border: 1px dashed rgba(192, 132, 252, 0.3);
        border-radius: 12px;
        text-align: center;
      }

      .feedback-card {
        background: linear-gradient(135deg, rgba(30, 41, 59, 0.5) 0%, rgba(15, 23, 42, 0.8) 100%);
        border: 1px solid var(--accent-purple);
        box-shadow: 0 10px 25px rgba(192, 132, 252, 0.08);
        border-radius: 12px;
        padding: 1.5rem;
      }

      .feedback-title {
        display: flex;
        align-items: center;
        gap: 0.5rem;
        color: var(--accent-purple);
        font-weight: bold;
        font-size: 1.1rem;
        margin-bottom: 1rem;
      }

      .score-display {
        display: flex;
        align-items: baseline;
        gap: 0.2rem;
        margin-bottom: 1rem;
      }

      .score-num {
        font-size: 2.2rem;
        font-weight: 800;
        color: #fff;
        font-family: 'Outfit', sans-serif;
      }

      .score-total {
        font-size: 0.9rem;
        color: #64748b;
      }

      .feedback-list {
        display: flex;
        flex-direction: column;
        gap: 0.85rem;
        max-height: 400px;
        overflow-y: auto;
        padding-right: 0.25rem;
      }

      .feedback-item {
        font-size: 0.85rem;
        line-height: 1.45;
        padding: 0.75rem;
        background: rgba(255,255,255,0.02);
        border-radius: 6px;
        border-left: 3px solid var(--accent-purple);
      }

      .feedback-keyword-match {
        color: var(--accent-green);
        font-weight: bold;
      }

      /* --- CHEMICAL TRANSFER ANIMATIONS --- */

      /* 1. Solid Powder Pile at the bottom of Beaker */
      .solid-powder-pile {
        position: absolute;
        bottom: 0;
        left: 20px;
        width: 80px;
        height: 14px;
        background: radial-gradient(circle, var(--accent-blue) 0%, rgba(56, 189, 248, 0.6) 50%, transparent 80%);
        border-radius: 50% 50% 0 0;
        z-index: 5;
        transition: transform 1.5s ease-in-out, opacity 1.5s ease-in-out;
      }

      /* 2. Weighing Paper with Solid Powder Moving */
      .weighing-paper-transfer {
        position: absolute;
        width: 80px;
        height: 20px;
        background: #f8fafc;
        border: 1px solid #cbd5e1;
        border-radius: 2px;
        top: 200px;
        left: calc(50% - 150px);
        z-index: 40;
        transform-origin: center;
        display: flex;
        align-items: center;
        justify-content: center;
        box-shadow: 0 4px 8px rgba(0,0,0,0.25);
        pointer-events: none;
      }

      .weighing-paper-powder {
        width: 30px;
        height: 10px;
        background: var(--accent-blue);
        border-radius: 50% 50% 0 0;
        box-shadow: 0 0 6px var(--accent-blue);
      }

      .animate-solid-transfer {
        animation: solidTransferAnim 2s cubic-bezier(0.25, 1, 0.5, 1) forwards;
      }

      @keyframes solidTransferAnim {
        0% { transform: translate(0, 0) rotate(0deg); opacity: 1; }
        35% { transform: translate(140px, -70px) rotate(15deg); }
        50% { transform: translate(140px, -70px) rotate(-65deg); }
        80% { transform: translate(140px, -70px) rotate(-65deg); opacity: 1; }
        100% { transform: translate(140px, -20px) rotate(-65deg); opacity: 0; }
      }

      /* 3. Dropping Powder Particles */
      .powder-drop-particles {
        position: absolute;
        width: 16px;
        height: 50px;
        left: calc(50% + 20px);
        top: 170px;
        z-index: 35;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 4px;
        opacity: 0;
        pointer-events: none;
      }

      .animate-powder-drop {
        animation: powderDropAnim 2s cubic-bezier(0.25, 1, 0.5, 1) forwards;
      }

      .powder-particle {
        width: 4px;
        height: 4px;
        background: var(--accent-blue);
        border-radius: 50%;
        box-shadow: 0 0 2px var(--accent-blue);
      }

      @keyframes powderDropAnim {
        0%, 40% { opacity: 0; transform: translateY(0); }
        45% { opacity: 1; }
        70% { opacity: 1; transform: translateY(80px); }
        80%, 100% { opacity: 0; transform: translateY(90px); }
      }

      /* 4. Pipette Moving Animation */
      .pipette-tool-animate {
        position: absolute;
        width: 14px;
        height: 120px;
        background: linear-gradient(90deg, rgba(255,255,255,0.4) 0%, rgba(255,255,255,0.15) 50%, rgba(255,255,255,0.4) 100%);
        border: 1px solid rgba(255, 255, 255, 0.5);
        border-radius: 2px 2px 8px 8px;
        z-index: 45;
        top: 110px;
        left: calc(50% - 150px);
        transform-origin: top center;
        display: flex;
        flex-direction: column;
        justify-content: flex-end;
        pointer-events: none;
        box-shadow: 0 4px 10px rgba(0,0,0,0.3);
      }

      .pipette-bulb {
        position: absolute;
        top: -20px;
        left: -3px;
        width: 20px;
        height: 20px;
        background: #ef4444;
        border-radius: 10px 10px 0 0;
      }

      .pipette-liquid-content {
        width: 100%;
        background: var(--color-cuso4);
        border-radius: 0 0 6px 6px;
        transition: height 0.5s ease;
      }

      .animate-pipetting {
        animation: pipetteAnim 2.8s cubic-bezier(0.25, 1, 0.5, 1) forwards;
      }

      @keyframes pipetteAnim {
        0% { transform: translate(0, 0); opacity: 0; }
        10% { transform: translate(0, -40px); opacity: 1; }
        25% { transform: translate(0, 20px); } /* Insert into standard flask */
        40% { transform: translate(0, -40px); } /* Lift with liquid */
        65% { transform: translate(145px, -40px); } /* Move to reaction beaker */
        75% { transform: translate(145px, 20px); } /* Lower in beaker */
        90% { transform: translate(145px, -40px); } /* Dispense & lift */
        100% { transform: translate(0, -40px); opacity: 0; }
      }

      /* 5. Liquid Pour Stream Effect */
      .liquid-pour-stream {
        position: absolute;
        width: 4px;
        background: rgba(56, 189, 248, 0.7);
        z-index: 25;
        top: 180px;
        left: calc(50% - 20px);
        opacity: 0;
        height: 0;
        transition: all 0.2s ease;
        pointer-events: none;
        border-radius: 2px;
        box-shadow: 0 0 6px rgba(56, 189, 248, 0.5);
      }

      .liquid-pour-stream.active {
        opacity: 1;
        height: 120px;
        animation: streamWiggle 0.15s infinite alternate;
      }

      @keyframes streamWiggle {
        0% { transform: translateX(-1px); }
        100% { transform: translateX(1px); }
      }

      /* 6. Pouring Beaker (Beaker -> Flask) Animation */
      .animate-pouring-beaker {
        animation: pourBeakerAnim 1.8s ease-in-out forwards;
      }

      @keyframes pourBeakerAnim {
        0% { transform: translate(0, 0) rotate(0deg); }
        30% { transform: translate(100px, -50px) rotate(15deg); }
        42% { transform: translate(100px, -50px) rotate(75deg); }
        75% { transform: translate(100px, -50px) rotate(75deg); }
        100% { transform: translate(0, 0) rotate(0deg); }
      }

      /* 7. Pouring Beaker to Cuvette (Beaker -> Cuvette) Animation */
      .animate-pouring-to-cuvette {
        animation: pourCuvetteAnim 1.8s ease-in-out forwards;
      }

      @keyframes pourCuvetteAnim {
        0% { transform: translate(0, 0) rotate(0deg); }
        30% { transform: translate(105px, -60px) rotate(15deg); }
        42% { transform: translate(105px, -60px) rotate(75deg); }
        75% { transform: translate(105px, -60px) rotate(75deg); }
        100% { transform: translate(0, 0) rotate(0deg); }
      }

      /* 8. Pouring Glycine Beaker into Reaction Beaker Animation */
      .animate-pouring-glycine-beaker {
        animation: pourGlycineAnim 1.8s ease-in-out forwards;
      }

      @keyframes pourGlycineAnim {
        0% { transform: translate(0, 0) rotate(0deg); }
        30% { transform: translate(-75px, -50px) rotate(-15deg); }
        42% { transform: translate(-75px, -50px) rotate(-75deg); }
        75% { transform: translate(-75px, -50px) rotate(-75deg); }
        100% { transform: translate(0, 0) rotate(0deg); }
      }

      /* PRINT LAYOUT OVERRIDES */
      @media print {
        body {
          background: #fff !important;
          color: #000 !important;
        }
        
        .app-header, .step-btn, .bench-controls, .device-buttons, .cuvette-rack, .action-btn, .control-btn, .feedback-sidebar {
          display: none !important;
        }
        
        #root, .app-container, .app-content {
          background: #fff !important;
          color: #000 !important;
          padding: 0 !important;
          margin: 0 !important;
          width: 100% !important;
        }
        
        .glass-card {
          background: #fff !important;
          border: none !important;
          box-shadow: none !important;
          padding: 0 !important;
          margin: 0 !important;
          color: #000 !important;
        }
        
        .card-title {
          color: #000 !important;
          font-size: 1.8rem !important;
          border-bottom: 2px solid #000;
          padding-bottom: 0.5rem;
        }

        .card-subtitle {
          color: #475569 !important;
        }
        
        .report-grid {
          grid-template-columns: 1fr !important;
          gap: 0 !important;
        }
        
        .report-table th {
          background: #f1f5f9 !important;
          color: #000 !important;
          border: 1px solid #cbd5e1 !important;
        }
        
        .report-table td, .report-table th, .report-table {
          border: 1px solid #cbd5e1 !important;
          color: #000 !important;
        }
        
        .table-input, .text-input, .textarea-input {
          color: #000 !important;
          background: transparent !important;
          border: none !important;
          border-bottom: 1px solid #94a3b8 !important;
          border-radius: 0 !important;
          padding: 0.25rem 0 !important;
        }
        
        .question-card {
          border: 1px solid #e2e8f0 !important;
          background: transparent !important;
          page-break-inside: avoid;
        }
        
        .question-text {
          color: #000 !important;
        }
        
        .chart-container {
          background: #fff !important;
          border: 1px solid #cbd5e1 !important;
          color: #000 !important;
          page-break-inside: avoid;
        }
        
        .chart-text {
          fill: #000 !important;
        }
        
        .chart-grid-line {
          stroke: rgba(0, 0, 0, 0.1) !important;
        }
      }
      
      .shimmer {
        animation: pulseGlow 1.5s infinite;
      }
    </style>
  </head>
  <body>
    <div id="root">
      <div class="app-container">
        <!-- Header -->
        <header class="app-header">
          <div class="logo-section">
            <div class="logo-icon">
              <i data-lucide="activity" style="width: 32px; height: 32px;"></i>
            </div>
            <div class="logo-text">
              <h1>황산구리 리간드 교환 반응</h1>
              <p>휘문고등학교 화학 동아리 가상 실험실</p>
            </div>
          </div>

          <!-- Steps navigation -->
          <nav class="nav-steps" id="header-nav"></nav>
        </header>

        <!-- Main Workspace Content -->
        <main class="app-content" id="main-content"></main>
      </div>
    </div>

    <!-- UI Interaction logic (Vanilla JS) -->
    <script>
      // 1. Initial State
      const state = {
        currentStep: 0, // 0: Safety, 1: Lab Bench, 2: Spectroscopy, 3: Report
        safety: {
          goggles: false,
          mask: false,
          gloves: false,
        },
        labProgress: {
          cuso4Prepared: false,
          naclFinished: false,
          nh3Finished: false,
          glycineFinished: false,
        },
        cuvettesInRack: {
          blank: true,
          c1: false,
          c2: false,
          c3: false,
        },
        scannedData: {
          blank: false,
          c1: false,
          c2: false,
          c3: false,
        },
        activeTab: 0, // Bench Sub-experiments: 0: CuSO4, 1: NaCl, 2: NH3, 3: Glycine
        subStep: 0, // Indicator inside activeTab
        
        // Tab 0 states
        scaleState: {
          power: false,
          tare: false,
          weight: 0.00
        },
        beakerLiquid: 0,
        flaskLiquid: 0,
        rinseCount: 0,
        shaken: false,

        // Tab 1 states
        naclState: {
          cuAdded: false,
          naclDrops: 0,
          solutionColor: 'var(--color-cuso4)',
          inCuvette: false
        },

        // Tab 2 states
        nh3State: {
          cuAdded: false,
          nh3Drops: 0,
          hasPrecipitate: false,
          isComplexFormed: false,
          solutionColor: 'var(--color-cuso4)',
          diluted: false,
          inCuvette: false
        },

        // Tab 3 states
        glycineState: {
          cuAdded: false,
          phAdjusted: false,
          phTestColor: '#fde047',
          phTestResult: 'pH 4 (산성)',
          glyPrepared: false,
          mixed: false,
          diluted: false,
          solutionColor: 'var(--color-cuso4)',
          inCuvette: false
        },

        // Spectroscopy states
        loadedCuvette: 'none', // 'none', 'blank', 'c1', 'c2', 'c3'
        baselineDone: false,
        isScanning: false,
        scanProgress: 0,
        activeScanTarget: null,
        hoverWavelength: null,
        mousePos: { x: 0, y: 0 },

        // Report states
        studentInfo: {
          name: '',
          studentId: ''
        },
        lambdaInputs: {
          blank: '없음 (증류수 바탕 시료)',
          c1: '',
          c2: '',
          c3: ''
        },
        answers: {
          q1: '',
          q2: '',
          q3: '',
          q4: '',
          q5: ''
        },
        submitted: false,
        evaluation: null
      };

      // 2. Spectrometer Curve Data
      const getAbsorbance = (target, wl) => {
        switch (target) {
          case 'blank':
            return 0.02 + Math.sin(wl / 100) * 0.005; // nearly zero
          case 'c1': // NaCl [CuCl4]2- (yellow-green, peaks around 740nm)
            const peak1 = 740;
            const width1 = 120;
            const maxAbs1 = 1.35;
            return maxAbs1 * Math.exp(-Math.pow(wl - peak1, 2) / (2 * Math.pow(width1, 2))) + 0.15;
          case 'c2': // NH3 [Cu(NH3)4(H2O)2]2+ (deep blue, peaks around 610nm)
            const peak2 = 610;
            const width2 = 60;
            const maxAbs2 = 1.62;
            return maxAbs2 * Math.exp(-Math.pow(wl - peak2, 2) / (2 * Math.pow(width2, 2))) + 0.05;
          case 'c3': // Glycine [Cu(Gly)2] (violet, peaks around 630nm)
            const peak3 = 630;
            const width3 = 80;
            const maxAbs3 = 1.18;
            return maxAbs3 * Math.exp(-Math.pow(wl - peak3, 2) / (2 * Math.pow(width3, 2))) + 0.08;
          default:
            return 0;
        }
      };

      // 3. UI Update Engine
      function updateUI() {
        renderNavigation();
        renderMainContent();
        lucide.createIcons();
      }

      // Step Configuration
      const stepsList = [
        { id: 0, label: "안전 장비 착용", icon: "shield-check" },
        { id: 1, label: "실험 및 시약 제조", icon: "pipette" },
        { id: 2, label: "UV-Vis 분광 분석", icon: "activity" },
        { id: 3, label: "보고서 및 AI 피드백", icon: "file-spreadsheet" }
      ];

      // Navigation bar renderer
      function renderNavigation() {
        const isSafetyAllEquipped = state.safety.goggles && state.safety.mask && state.safety.gloves;
        const nav = document.getElementById('header-nav');
        nav.innerHTML = '';
        
        stepsList.forEach(step => {
          const isActive = state.currentStep === step.id;
          const isCompleted = isSafetyAllEquipped && (
            (step.id === 0) ||
            (step.id === 1 && state.labProgress.naclFinished && state.labProgress.nh3Finished && state.labProgress.glycineFinished) ||
            (step.id === 2 && state.scannedData.c1 && state.scannedData.c2 && state.scannedData.c3)
          );
          
          const btn = document.createElement('button');
          btn.className = `step-btn ${isActive ? 'active' : ''} ${isCompleted ? 'completed' : ''}`;
          btn.disabled = step.id > 0 && !isSafetyAllEquipped;
          btn.innerHTML = `<i data-lucide="${step.icon}" style="width: 18px; height: 18px;"></i><span>${step.label}</span>`;
          btn.onclick = () => {
            if (!isSafetyAllEquipped && step.id > 0) {
              alert("실험을 시작하기 전에 보안경, 마스크, 실험용 장갑을 모두 착용해야 합니다!");
              return;
            }
            state.currentStep = step.id;
            updateUI();
          };
          nav.appendChild(btn);
        });
      }

      // Main content routing renderer
      function renderMainContent() {
        const main = document.getElementById('main-content');
        main.innerHTML = '';

        if (state.currentStep === 0) {
          renderPhase0(main);
        } else if (state.currentStep === 1) {
          renderPhase1(main);
        } else if (state.currentStep === 2) {
          renderPhase2(main);
        } else if (state.currentStep === 3) {
          renderPhase3(main);
        }
      }

      // --- PHASE 0 Renderer: Safety Gear ---
      function renderPhase0(container) {
        const isSafetyAllEquipped = state.safety.goggles && state.safety.mask && state.safety.gloves;
        
        const div = document.createElement('div');
        div.className = 'glass-card safety-layout';
        div.innerHTML = `
          <h2 class="card-title">안전한 실험을 위한 준비</h2>
          <p class="card-subtitle">실험에 참여하기 전, 안전 수칙을 준수하기 위해 개인 보호구(PPE)를 반드시 착용해 주세요.</p>
          
          <div class="safety-grid">
            <div class="safety-item ${state.safety.goggles ? 'equipped' : ''}" id="safety-goggles">
              <div class="safety-icon-wrapper">🥽</div>
              <h3>보안경 (Goggles)</h3>
              <p>화학 물질이 눈에 튀는 것을 방지합니다.</p>

              <span style="font-size: 0.8rem; margin-top: 8px; color: ${state.safety.gloves ? 'var(--accent-green)' : '#ef4444'}; font-weight: bold;">

                <span>모든 안전 장비를 클릭하여 착용해야 실험실에 입장할 수 있습니다.</span>

            <button class="action-btn" id="enter-lab-btn" ${!isSafetyAllEquipped ? 'disabled' : ''}>
              <i data-lucide="check-circle" style="width: 18px; height: 18px;"></i>
              <span>가상 실험실 입장</span>
            </button>
          </div>
        `;
        
        container.appendChild(div);

        // Events
        div.querySelector('#safety-goggles').onclick = () => {
          state.safety.goggles = !state.safety.goggles;
          updateUI();
        };
        div.querySelector('#safety-mask').onclick = () => {
          state.safety.mask = !state.safety.mask;
          updateUI();
        };
        div.querySelector('#safety-gloves').onclick = () => {
          state.safety.gloves = !state.safety.gloves;
          updateUI();
        };
        div.querySelector('#enter-lab-btn').onclick = () => {
          if (isSafetyAllEquipped) {
            state.currentStep = 1;
            updateUI();
          }
        };
      }

      let localLoading = false;
      let localDropAnimation = false;
      let localDropColor = 'var(--accent-blue)';
      let localStirring = false;
      let isTransferringSolid = false;
      let isPouring = false;
      let isPipetting = false;
      let isPouringGlycine = false;
      let hasSolidInBeaker = false;

      function renderPhase1(container) {
        const layout = document.createElement('div');
        layout.className = 'lab-layout';
        
        // 1) Guide Panel (Left side)
        const guidePanel = document.createElement('div');
        guidePanel.className = 'guide-panel';
        
        const stepSelectCard = document.createElement('div');
        stepSelectCard.className = 'glass-card';
        stepSelectCard.style.padding = '1.25rem';
        stepSelectCard.style.marginBottom = '0';
        stepSelectCard.innerHTML = `
          <h3 class="card-title" style="font-size: 1.1rem; margin-bottom: 0.75rem;">실험 단계 선택</h3>
          <div style="display: flex; flex-direction: column; gap: 0.5rem;">
            <button id="tab-btn-0" class="step-btn ${state.activeTab === 0 ? 'active' : ''} ${state.labProgress.cuso4Prepared ? 'completed' : ''}" style="width: 100%; justify-content: flex-start; border-radius: 8px;">
              <span>0.1M CuSO₄ 수용액 제조</span>
            </button>
            <button id="tab-btn-1" ${!state.labProgress.cuso4Prepared ? 'disabled' : ''} class="step-btn ${state.activeTab === 1 ? 'active' : ''} ${state.labProgress.naclFinished ? 'completed' : ''}" style="width: 100%; justify-content: flex-start; border-radius: 8px;">
              <span>실험 ①: 포화 NaCl 반응</span>
            </button>
            <button id="tab-btn-2" ${!state.labProgress.cuso4Prepared ? 'disabled' : ''} class="step-btn ${state.activeTab === 2 ? 'active' : ''} ${state.labProgress.nh3Finished ? 'completed' : ''}" style="width: 100%; justify-content: flex-start; border-radius: 8px;">
              <span>실험 ②: 진한 암모니아 반응</span>
            </button>
            <button id="tab-btn-3" ${!state.labProgress.cuso4Prepared ? 'disabled' : ''} class="step-btn ${state.activeTab === 3 ? 'active' : ''} ${state.labProgress.glycineFinished ? 'completed' : ''}" style="width: 100%; justify-content: flex-start; border-radius: 8px;">
              <span>실험 ③: 글라이신 반응</span>
            </button>
          </div>
        `;
        guidePanel.appendChild(stepSelectCard);

        const instructionBox = document.createElement('div');
        instructionBox.className = 'instruction-box';
        
        let instructionsHtml = '';
        if (state.activeTab === 0) {
          instructionsHtml = `

              <div class="instruction-step ${state.subStep >= 1 ? '' : 'opacity-40'}">

              <div class="instruction-step ${state.subStep >= 2 ? '' : 'opacity-40'}">
                <div class="step-num">3</div>

              </div>
              <div class="instruction-step ${state.subStep >= 5 ? '' : 'opacity-40'}">
                <div class="step-num">5</div>
                <div class="step-desc">비커를 씻기병으로 <b>2회 헹구어</b> 남은 황산구리 이온까지 완전히 플라스크에 넣습니다.</div>

              <div class="instruction-step ${state.subStep >= 6 ? '' : 'opacity-40'}">
                <div class="step-num">6</div>

                <div class="step-num">7</div>

            </div>
          `;
        } else if (state.activeTab === 1) {

                <div class="step-num">2</div>

              </div>
              <div class="instruction-step ${state.subStep >= 3 ? '' : 'opacity-40'}">
                <div class="step-num">3</div>
                <div class="step-desc">용액의 색깔 변화(하늘색 → 녹색 → 황록색)를 확인하고 <b>큐벳 ①</b>에 나누어 담습니다.</div>

              <div class="instruction-step ${state.subStep >= 3 ? '' : 'opacity-40'}">
                <div class="step-num">4</div>
                <div class="step-desc">두 비커의 수용액을 혼합하여 **보라색/파란색([Cu(Gly)₂])**으로 색이 변하는지 관찰합니다.</div>

              <div class="instruction-step ${state.subStep >= 4 ? '' : 'opacity-40'}">
                <div class="step-num">5</div>

              </div>
              <div class="instruction-step ${state.subStep >= 5 ? '' : 'opacity-40'}">

        instructionBox.innerHTML = instructionsHtml;

        const benchHeader = document.createElement('div');

        // Drop animation overlay

            <div class="dropper-tip"></div>
            <div class="chemical-drop" style="background-color: ${localDropColor}"></div>
          `;
          benchDisplay.appendChild(dropper);
        }

        // Render based on Active Tab
        if (state.activeTab === 0) {
          // --- TAB 0 CuSO4 PREP ---
          if (state.subStep <= 1 || isTransferringSolid) {
            const scaleWrapper = document.createElement('div');
            scaleWrapper.className = 'scale-container';
            scaleWrapper.style.opacity = isTransferringSolid ? '0.4' : '1';
            scaleWrapper.style.transition = 'opacity 0.5s';
            scaleWrapper.innerHTML = `
              <div class="lab-scale">
                <div class="scale-plate"></div>
                <div class="scale-display" id="scale-val">
                  ${state.scaleState.power ? `${state.scaleState.weight.toFixed(2)} g` : 'OFF'}
                </div>
              </div>
              ${!isTransferringSolid ? `
                <div style="display: flex; gap: 0.5rem; margin-top: 0.5rem; flex-wrap: wrap; justify-content: center;">
                  <button id="btn-scale-power" class="control-btn">전원</button>
                  <button id="btn-scale-tare" class="control-btn" ${!state.scaleState.power ? 'disabled' : ''}>영점(Tare)</button>
                  <button id="btn-scale-add-125" class="control-btn" ${(!state.scaleState.power || !state.scaleState.tare) ? 'disabled' : ''}>
                    기본 스푼 (+1.25g)
                  </button>
                </div>
                ${state.scaleState.power && state.scaleState.tare ? `
                  <div style="margin-top: 0.5rem; display: flex; flex-direction: column; gap: 0.25rem; width: 100%;">
                    <div style="display: flex; gap: 0.25rem; justify-content: center;">
                      <button id="btn-scale-add-1" class="control-btn" style="padding: 0.25rem 0.5rem; font-size: 0.75rem;">+1.00g</button>
                      <button id="btn-scale-add-01" class="control-btn" style="padding: 0.25rem 0.5rem; font-size: 0.75rem;">+0.10g</button>
                      <button id="btn-scale-add-001" class="control-btn" style="padding: 0.25rem 0.5rem; font-size: 0.75rem;">+0.01g</button>
                    </div>
                    <div style="display: flex; gap: 0.25rem; justify-content: center;">
                      <button id="btn-scale-sub-1" class="control-btn" ${state.scaleState.weight <= 0 ? 'disabled' : ''} style="padding: 0.25rem 0.5rem; font-size: 0.75rem;">-1.00g</button>
                      <button id="btn-scale-sub-01" class="control-btn" ${state.scaleState.weight <= 0 ? 'disabled' : ''} style="padding: 0.25rem 0.5rem; font-size: 0.75rem;">-0.10g</button>
                      <button id="btn-scale-sub-001" class="control-btn" ${state.scaleState.weight <= 0 ? 'disabled' : ''} style="padding: 0.25rem 0.5rem; font-size: 0.75rem;">-0.01g</button>
                    </div>
                  </div>
                ` : ''}
                ${state.scaleState.weight === 6.24 && state.subStep === 1 ? `
                  <button id="btn-scale-complete" class="control-btn primary" style="margin-top: 0.5rem;">
                    계량 완료
                  </button>
                ` : ''}
              ` : ''}
            `;
            benchDisplay.appendChild(scaleWrapper);
          }
          if ((state.subStep >= 2 && state.subStep <= 3) || isTransferringSolid) {
            const beakerWrapper = document.createElement('div');
            beakerWrapper.className = 'beaker-container';
            beakerWrapper.style.transition = 'all 0.5s';
            beakerWrapper.innerHTML = `
              ${localStirring ? '<div class="stirring-rod stirring"></div>' : ''}
              ${!localStirring && state.subStep === 3 ? '<div class="stirring-rod"></div>' : ''}
              <div class="beaker">
                ${hasSolidInBeaker ? `
                  <div class="solid-powder-pile" style="transform: ${localStirring ? 'scale(0.2) translateY(5px)' : 'scale(1)'}; opacity: ${state.beakerLiquid > 0 && localStirring ? 0.2 : 1};"></div>
                ` : ''}
                <div class="liquid" style="height: ${state.beakerLiquid}%; background-color: ${state.beakerLiquid > 0 ? 'var(--color-cuso4)' : 'transparent'};">

            const x = ((wl - 400) / 500) * width;
            const y = height - (abs / 2.0) * height; // Scale 0~2 Abs over 320px

        const updatePaths = () => {
          ['blank', 'c1', 'c2', 'c3'].forEach(key => {
            const pathNode = layout.querySelector(`#path-${key}`);
            if (pathNode) {
              if (state.scannedData[key]) {
                // If it is the currently scanning one, render up to scanProgress
                if (state.isScanning && state.activeScanTarget === key) {
                  pathNode.setAttribute('d', generatePathData(key, state.scanProgress));
                } else {
                  pathNode.setAttribute('d', generatePathData(key, 100));
                }
              } else {
                pathNode.setAttribute('d', '');
              }
            }
          });
        };

        updatePaths();

        // --- Event handler attachments ---
        layout.querySelector('#rack-slot-blank').onclick = () => {
          if (state.isScanning) return;
          state.loadedCuvette = 'blank';
          updateUI();
        };

        layout.querySelector('#rack-slot-c1').onclick = () => {
          if (state.isScanning || !state.cuvettesInRack.c1) return;
          state.loadedCuvette = 'c1';
          updateUI();
        };

        layout.querySelector('#rack-slot-c2').onclick = () => {
          if (state.isScanning || !state.cuvettesInRack.c2) return;
          state.loadedCuvette = 'c2';
          updateUI();
        };

        layout.querySelector('#rack-slot-c3').onclick = () => {
          if (state.isScanning || !state.cuvettesInRack.c3) return;
          state.loadedCuvette = 'c3';
          updateUI();
        };

        const spectroSlot = layout.querySelector('#spectro-slot');
        if (spectroSlot) {
          spectroSlot.onclick = () => {
            if (state.isScanning) return;
            state.loadedCuvette = 'none';
            updateUI();
          };
        }

        const btnUnload = layout.querySelector('#btn-unload');
        if (btnUnload) {
          btnUnload.onclick = () => {
            if (state.isScanning) return;
            state.loadedCuvette = 'none';
            updateUI();
          };
        }

        const btnScan = layout.querySelector('#btn-scan');
        if (btnScan) {
          btnScan.onclick = () => {
            if (state.loadedCuvette === 'none') {
              alert("분광기에 측정할 큐벳을 장착해 주세요!");
              return;
            }
            if (state.loadedCuvette !== 'blank' && !state.baselineDone) {
              alert("시료를 측정하기 전에 Blank(증류수)를 넣고 베이스라인을 먼저 측정해야 합니다!");
              return;
            }

            state.isScanning = true;
            state.scanProgress = 0;
            state.activeScanTarget = state.loadedCuvette;
            state.scannedData[state.activeScanTarget] = true; // start drawing
            
            updateUI();

            const laserLine = document.getElementById('laser-scan-line');
            if (laserLine) laserLine.style.display = 'block';

            // Simulate scan process
            const scanInterval = setInterval(() => {
              state.scanProgress += 4;
              if (state.scanProgress >= 100) {
                state.scanProgress = 100;
                state.isScanning = false;
                clearInterval(scanInterval);
                
                if (state.activeScanTarget === 'blank') {
                  state.baselineDone = true;
                  alert("베이스라인 보정이 완료되었습니다!");
                }
                updateUI();
              } else {
                // Update laser line position
                if (laserLine) {
                  laserLine.setAttribute('x1', `${(state.scanProgress / 100) * 600}`);
                  laserLine.setAttribute('x2', `${(state.scanProgress / 100) * 600}`);
                }
                updatePaths();
              }
            }, 50);
          };
        }

        // Mouse Move for Tooltip
        const chartWrapper = layout.querySelector('#chart-svg-wrapper');
        const tooltip = layout.querySelector('#chart-tooltip');
        const hoverLine = layout.querySelector('#hover-track-line');
        
        if (chartWrapper && tooltip && hoverLine) {
          chartWrapper.onmousemove = (e) => {
            if (state.isScanning) return;
            const rect = chartWrapper.getBoundingClientRect();
            const x = e.clientX - rect.left;
            const y = e.clientY - rect.top;
            
            // convert x to wavelength (400 - 900 nm)
            const wavelength = Math.round(400 + (x / rect.width) * 500);
            
            if (wavelength >= 400 && wavelength <= 900) {
              hoverLine.style.display = 'block';
              const svgX = ((wavelength - 400) / 500) * 600;
              hoverLine.setAttribute('x1', svgX);
              hoverLine.setAttribute('x2', svgX);
              
              // Calculate tooltip values
              let tooltipHtml = `<div style="font-weight: bold; margin-bottom: 4px; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 2px;">파장: ${wavelength} nm</div>`;
              let hasData = false;
              
              if (state.scannedData.c1) {
                tooltipHtml += `<div style="color: ${lineColors.c1};">①번(NaCl): ${getAbsorbance('c1', wavelength).toFixed(3)} Abs</div>`;
                hasData = true;
              }
              if (state.scannedData.c2) {
                tooltipHtml += `<div style="color: ${lineColors.c2};">②번(NH₃): ${getAbsorbance('c2', wavelength).toFixed(3)} Abs</div>`;
                hasData = true;
              }
              if (state.scannedData.c3) {
                tooltipHtml += `<div style="color: ${lineColors.c3};">③번(글라이신): ${getAbsorbance('c3', wavelength).toFixed(3)} Abs</div>`;
                hasData = true;
              }
              
              if (hasData) {
                tooltip.style.display = 'block';
                tooltip.style.left = `${x + 15}px`;
                tooltip.style.top = `${y - 80}px`;
                tooltip.innerHTML = tooltipHtml;
              } else {
                tooltip.style.display = 'none';
              }
            }
          };

          chartWrapper.onmouseleave = () => {
            hoverLine.style.display = 'none';
            tooltip.style.display = 'none';
          };
        }

        layout.querySelector('#btn-back-bench').onclick = () => {
          state.currentStep = 1;
          updateUI();
        };

        const btnToReport = layout.querySelector('#btn-to-report');
        if (btnToReport) {
          btnToReport.onclick = () => {
            state.currentStep = 3;
            updateUI();
          };
        }
      }

      // --- PHASE 3 Renderer: Report ---

        const btnSubmit = layout.querySelector('#btn-submit-report');

            // Perform grading

            let tableScore = 0;
            if (isC1Correct) tableScore += 10;
            if (isC2Correct) tableScore += 10;
            if (isC3Correct) tableScore += 10;
            score += tableScore;

            feedbacks.push({
              title: "최대 흡수 파장 데이터 테이블 검증",

                <br/>• 글라이신 반응(③): ${isNaN(t3) ? '미입력' : t3 + ' nm'} (${isC3Correct ? '정확함 - 이론치 약 630 nm' : '오차 있음 - 이론치 630 nm'})`
            });

            // Q1: Complementary colors
            const q1Keywords = ['보색', '흡수', '반사', '통과', '색상'];

            const q1Score = q1Matches.length >= 2 ? 14 : q1Matches.length * 6;
            score += q1Score;
            feedbacks.push({
              title: "탐구 1: 보색 관계와 흡수 스펙트럼",
              matches: q1Matches,
              desc: q1Score >= 12 
                ? "훌륭합니다! 물질의 고유한 색상은 흡수된 빛의 '보색'에 해당하는 파장이 반사/투과되어 우리 눈에 보인다는 점을 명확히 설명했습니다."
                : "보색(Complementary Color)과 빛의 흡수/반사 메커니즘을 연관 지어 보완 설명해 보세요."
            });

            // Q2: Dilution
            const q2Keywords = ['비어', '람베르트', '흡광도', '포화', '농도', '검출', '한계'];
            const q2Matches = q2Keywords.filter(kw => state.answers.q2.toLowerCase().includes(kw));
            const q2Score = q2Matches.length >= 2 ? 14 : q2Matches.length * 6;
            score += q2Score;
            feedbacks.push({
              title: "탐구 2: 용액을 희석한 이유 (비어-람베르트 법칙)",
              matches: q2Matches,
              desc: q2Score >= 12
                ? "잘 작성하셨습니다. 흡광도가 너무 높으면 빛이 대부분 흡수되어 분광 장비의 검출 한계를 넘어서(포화 상태) 농도와 흡광도의 비례 관계(비어-람베르트 법칙)가 깨진다는 핵심을 짚었습니다."
                : "흡광도가 너무 높을 때의 기기 측정 한계 및 농도-흡광도 법칙(Beer-Lambert Law)을 서술해 주세요."
            });

            // Q3: Spectrochemical Series
            const q3Answers = ['cl', 'h2o', 'gly', 'nh3'];
            const q3AnsNorm = state.answers.q3.replace(/\s+/g, '').toLowerCase();
            const orderCorrect = q3AnsNorm.includes('cl') && q3AnsNorm.includes('h2o') && q3AnsNorm.includes('gly') && q3AnsNorm.includes('nh3') &&
                                 q3AnsNorm.indexOf('cl') < q3AnsNorm.indexOf('h2o') &&
                                 q3AnsNorm.indexOf('h2o') < q3AnsNorm.indexOf('gly') &&
                                 q3AnsNorm.indexOf('gly') < q3AnsNorm.indexOf('nh3');
            const q3Score = orderCorrect ? 14 : 0;
            score += q3Score;
            feedbacks.push({
              title: "탐구 3: 분광화학적 계열과 리간드 장 세기",
              desc: orderCorrect
                ? "정확합니다! 리간드의 d오비탈 갈라짐 에너지 세기 순서는 Cl⁻ < H₂O < Glycine < NH₃ 순서입니다. 파장이 짧을수록 에너지가 크므로 갈라짐이 큰 강한 장 리간드입니다."
                : "스펙트럼의 피크 파장(λ_max)이 짧을수록 에너지가 큽니다. 에너지가 클수록 d오비탈 갈라짐이 큰 강한 장 리간드이므로 순서를 다시 검토해 보세요."
            });

            // Q4: Le Chatelier Principle
            const q4Keywords = ['평형', '르샤틀리에', '역반응', '왼쪽', '푸른', '하늘', '감소'];
            const q4Matches = q4Keywords.filter(kw => state.answers.q4.toLowerCase().includes(kw));
            const q4Score = q4Matches.length >= 2 ? 14 : q4Matches.length * 6;
            score += q4Score;
            feedbacks.push({
              title: "탐구 4: 물 추가 시 변화 (르샤틀리에 원리)",
              matches: q4Matches,
              desc: q4Score >= 12
                ? "뛰어난 해석입니다! 증류수를 많이 가하면 물 분자의 농도가 크게 높아져 평형이 역반응(왼쪽)으로 이동하게 되고, 이에 따라 녹색/황록색에서 다시 하늘색 푸른빛([Cu(H₂O)₆]²⁺)으로 돌아갑니다."
                : "르샤틀리에 원리에 따라 용매인 물을 대량 가했을 때 평형 이동의 방향과 수용액의 색깔 복원 여부를 확인해 보세요."
            });

            // Q5: Chelate Effect
            const q5Keywords = ['킬레이트', '두자리', '고리', '안정', '엔트로피', '배위'];
            const q5Matches = q5Keywords.filter(kw => state.answers.q5.toLowerCase().includes(kw));
            const q5Score = q5Matches.length >= 2 ? 14 : q5Matches.length * 6;
            score += q5Score;
            feedbacks.push({
              title: "탐구 5: 킬레이트 효과 (글라이신 배위)",
              matches: q5Matches,
              desc: q5Score >= 12
                ? "매우 훌륭합니다. 글라이신은 한 분자에 두 배위 원자(N, O)를 가져 금속 이온을 고리 형태로 감싸는 '두자리 킬레이트 리간드'를 형성하여, 한자리 리간드인 암모니아에 비해 엔트로피적/구조적으로 훨씬 안정한 착화합물을 만든다는 킬레이트 효과를 정교히 파악했습니다."
                : "글라이신이 왜 '두자리 리간드'인지, 킬레이트 효과(Chelate Effect)가 착화합물 안정성에 어떤 기여를 하는지 적어 보세요."
            });

            state.evaluation = {
              totalScore: score,
              feedbacks: feedbacks
            };
            state.submitted = true;
            updateUI();
          };
        }

        const btnEdit = layout.querySelector('#btn-edit-report');
        if (btnEdit) {
          btnEdit.onclick = () => {
            state.submitted = false;
            updateUI();
          };
        }

        const btnPrint = layout.querySelector('#btn-print-report');
        if (btnPrint) {
          btnPrint.onclick = () => {
            window.print();
          };
        }
      }

      // 4. Initial trigger on window load
      window.onload = () => {
        updateUI();
      };
    </script>
  </body>
</html>
